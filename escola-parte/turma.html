<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindfine — Turmas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --azul-bright: #32B5F1;
            --azul-escuro: #0277bd;
            --texto-cor: #1e293b;

            --sky: #32B5F1;
            --ocean: #4795c2;
            --deep: #0097dd;
            --border: rgba(50,181,241,0.12);
            --surface: #ffffff;
            --surface2: #f1f9ff;
            --text: #1e293b;
            --muted: #64748b;
            --happy: #fbbf24;
            --calm: #34d399;
            --sad: #60a5fa;
            --anxious: #8b5cf6;
            --alert: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--texto-cor);
        }

        /* ── FUNDO (igual ao inicio-escola) ── */
        .background-layer {
            position: fixed;
            width: 110%; height: 110%;
            background-image: url('fundos/fundo-a.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
            left: -5%; top: -5%;
            filter: blur(8px) brightness(0.6);
        }

        /* ── PARTÍCULAS (bolhas) ── */
        #particles-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }
        .bubble {
            position: absolute; bottom: -20px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            animation: rise linear forwards;
        }
        @keyframes rise {
            to { transform: translateY(-110vh); opacity: 0; }
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; left: 0; top: 0;
            width: 240px; height: 100vh;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
            z-index: 100; padding: 32px 0;
        }
        .sidebar-logo {
            padding: 0 24px 32px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        .logo-mark { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--azul-bright), var(--azul-escuro));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
}
        .logo-text {
            font-weight: 800; font-size: 18px;
            background: linear-gradient(90deg, var(--azul-bright), var(--azul-escuro));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-nav {
            flex: 1; padding: 0 12px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .nav-section-label {
            font-size: 10px; font-weight: 800; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.12em;
            padding: 16px 12px 8px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 10px;
            color: #64748b; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
            text-decoration: none; position: relative;
            margin-bottom: 4px;
        }
        .nav-item:hover { background: #f1f5f9; color: var(--azul-bright); }
        .nav-item.active {
            background: #e3f2fd; color: var(--azul-escuro); font-weight: 800;
        }
        .nav-item.active::before {
            content: ''; position: absolute;
            left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 18px;
            background: var(--azul-bright); border-radius: 0 2px 2px 0;
        }
        .nav-badge {
            margin-left: auto;
            background: #b8d1ff; color: #0059ff;
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 20px;
        }
        .sidebar-footer {
            padding: 16px 12px 0;
            border-top: 1px solid rgba(0,0,0,0.08); margin-top: 8px;
        }
       .user-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 12px;
    background: transparent;
}
.user-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--azul-bright), var(--azul-escuro));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
}

         .user-info-name {
            font-size: 13px;
            font-weight: 600;
            color: #0097dd;
        }

        .user-info-role {
            font-size: 11px;
            color: var(--muted);
        }
        /* ── MENU TOGGLE ── */
        .menu-toggle {
            display: none; position: fixed; top: 20px; left: 20px;
            z-index: 200; background: white;
            width: 44px; height: 44px; border-radius: 12px;
            cursor: pointer; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: none;
            font-size: 18px;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            position: relative; z-index: 10;
            margin-left: 240px; padding: 40px 32px; min-height: 100vh;
        }

        /* ── HEADER ── */
        .page-header {
            background: white;
            color: var(--azul-escuro);
            padding: 25px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 20px; flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: 24px; font-weight: 800;
            text-transform: uppercase; margin-bottom: 4px;
            color: var(--azul-escuro);
        }
        .header-left h1 span {
            background: linear-gradient(90deg, var(--azul-bright), var(--azul-escuro));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-left p { font-size: 14px; color: #666; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 12px; }

        /* ── BOTÕES ── */
        .btn-primary {
            background: linear-gradient(135deg, var(--azul-bright), var(--azul-escuro));
            color: #fff; border: none;
            padding: 10px 20px; border-radius: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(50,181,241,0.4);
        }
        .btn-ghost {
            background: white; color: #64748b;
            border: 2px solid #e2e8f0;
            padding: 10px 18px; border-radius: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: var(--azul-bright); color: var(--azul-bright); }

        /* ── FADE IN ── */
        .fade-in { opacity: 0; transform: translateY(16px); animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.10s; }
        .delay-3 { animation-delay: 0.15s; }

        /* ── SUMMARY STRIP ── */
        .summary-strip {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-bottom: 30px;
        }
        .summary-chip {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            padding: 20px 22px;
            display: flex; align-items: center; gap: 14px;
            transition: all 0.3s ease;
        }
        .summary-chip:hover { transform: translateY(-5px); }
        .chip-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .chip-icon.blue   { background: rgba(50,181,241,0.12); }
        .chip-icon.green  { background: rgba(52,211,153,0.12); }
        .chip-icon.purple { background: rgba(139,92,246,0.12); }
        .chip-icon.yellow { background: rgba(251,191,36,0.12); }
        .chip-value { font-size: 32px; font-weight: 800; color: var(--azul-escuro); line-height: 1; margin-bottom: 2px; }
        .chip-label { font-size: 11px; color: #666; font-weight: 800; text-transform: uppercase; }

        /* ── TOOLBAR ── */
        .toolbar {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            padding: 20px 24px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 24px; flex-wrap: wrap;
        }
        .search-box {
            display: flex; align-items: center; gap: 10px;
            background: #f8fafc; border: 2px solid #f0f0f0;
            border-radius: 12px; padding: 10px 16px; flex: 1; min-width: 200px;
        }
        .search-box input {
            background: transparent; border: none;
            color: var(--texto-cor); font-family: 'Montserrat', sans-serif;
            font-size: 14px; outline: none; width: 100%; font-weight: 600;
        }
        .search-box input::placeholder { color: var(--muted); font-weight: 400; }
        .search-icon { color: var(--muted); font-size: 16px; }

        .filter-chip {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 12px;
            border: 2px solid #f0f0f0; background: #f8fafc;
        }
        .filter-chip label {
            font-size: 10px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.08em;
            font-weight: 800; white-space: nowrap;
        }
        .filter-chip select {
            background: transparent; border: none;
            color: var(--texto-cor); font-family: 'Montserrat', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer; outline: none;
        }
        .view-toggle {
            display: flex; background: #f8fafc;
            border: 2px solid #f0f0f0; border-radius: 12px; overflow: hidden;
        }
        .view-btn {
            padding: 10px 14px; background: transparent; border: none;
            color: var(--muted); cursor: pointer; font-size: 16px; transition: all 0.2s;
        }
        .view-btn.active { background: #e3f2fd; color: var(--azul-escuro); }

        /* ── CLASS CARDS GRID ── */
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .class-card {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            overflow: hidden; cursor: pointer; transition: all 0.3s ease;
        }
        .class-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.25); }

        .card-accent { height: 5px; width: 100%; }
        .accent-blue   { background: linear-gradient(90deg, #32B5F1, #60a5fa); }
        .accent-green  { background: linear-gradient(90deg, #34d399, #10b981); }
        .accent-purple { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }
        .accent-yellow { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .accent-rose   { background: linear-gradient(90deg, #f87171, #ef4444); }
        .accent-teal   { background: linear-gradient(90deg, #2dd4bf, #0d9488); }

        .card-body { padding: 20px 22px; }
        .card-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; margin-bottom: 16px; gap: 10px;
        }
        .class-name { font-size: 17px; font-weight: 800; color: var(--texto-cor); margin-bottom: 4px; }
        .class-meta {
            font-size: 12px; color: var(--muted);
            display: flex; align-items: center; gap: 6px; font-weight: 600;
        }
        .meta-dot { width: 3px; height: 3px; background: var(--muted); border-radius: 50%; }

        .wellbeing-badge { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
        .wellbeing-score { font-size: 22px; font-weight: 800; line-height: 1; }
        .wellbeing-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800; }
        .score-high { color: #10b981; }
        .score-mid  { color: #f59e0b; }
        .score-low  { color: #ef4444; }

        /* Emotion mini-bars */
        .mini-emotions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
        .mini-row { display: flex; align-items: center; gap: 8px; }
        .mini-emoji { font-size: 13px; width: 18px; text-align: center; }
        .mini-track { flex: 1; height: 7px; background: #f0f4f8; border-radius: 4px; overflow: hidden; }
        .mini-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
        .mini-pct { font-size: 11px; font-weight: 800; color: var(--muted); width: 28px; text-align: right; }

        .bar-fill.happy   { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .bar-fill.calm    { background: linear-gradient(90deg, #10b981, #059669); }
        .bar-fill.sad     { background: linear-gradient(90deg, #38bdf8, #0ea5e9); }
        .bar-fill.anxious { background: linear-gradient(90deg, #a855f7, #9333ea); }

        /* Card footer */
        .card-footer {
            display: flex; align-items: center;
            justify-content: space-between;
            padding-top: 16px; border-top: 1px solid #f0f4f8;
        }
        .student-faces { display: flex; }
        .face-bubble {
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid white; display: flex;
            align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: #fff;
            margin-left: -6px;
        }
        .face-bubble:first-child { margin-left: 0; }
        .face-count { font-size: 11px; color: var(--muted); font-weight: 800; margin-left: 8px; }
        .alert-tag {
            font-size: 11px; font-weight: 800;
            padding: 4px 10px; border-radius: 20px;
        }
        .alert-tag.has-alerts { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .alert-tag.no-alerts  { background: rgba(52,211,153,0.1); color: #10b981; border: 1px solid rgba(52,211,153,0.2); }

        /* ── LIST VIEW ── */
        .classes-list { display: flex; flex-direction: column; gap: 12px; }
        .list-row {
            background: white; border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 16px 20px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; transition: all 0.2s;
        }
        .list-row:hover { transform: translateX(3px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .list-accent { width: 4px; height: 44px; border-radius: 4px; flex-shrink: 0; }
        .list-info { flex: 1; }
        .list-name { font-size: 15px; font-weight: 800; color: var(--texto-cor); }
        .list-meta { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 600; }
        .list-students { font-size: 12px; color: var(--muted); width: 80px; text-align: center; font-weight: 800; }
        .list-bar-wrap { width: 140px; }
        .list-bar-track { height: 6px; background: #f0f4f8; border-radius: 4px; overflow: hidden; }
        .list-bar-fill  { height: 100%; border-radius: 4px; transition: width 1s ease; }
        .list-arrows { color: var(--muted); font-size: 16px; }

        /* ── MODAL / DRAWER ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
            display: flex; align-items: flex-start; justify-content: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .drawer {
            width: 480px; height: 100vh;
            background: white; border-left: 1px solid #e2e8f0;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-overlay.open .drawer { transform: translateX(0); }

        .drawer-header {
            padding: 28px 28px 20px;
            border-bottom: 1px solid #f0f4f8;
            position: sticky; top: 0; background: white; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
        }
        .drawer-close {
            width: 34px; height: 34px;
            background: #f1f5f9; border: none; border-radius: 10px;
            color: var(--muted); font-size: 18px; cursor: pointer;
            transition: color 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .drawer-close:hover { color: var(--texto-cor); }
        .drawer-body { padding: 24px 28px; }
        .drawer-class-name { font-size: 22px; font-weight: 800; color: var(--texto-cor); margin-bottom: 4px; }
        .drawer-class-meta { font-size: 13px; color: var(--muted); font-weight: 600; }

        .drawer-stats {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 12px; margin: 20px 0;
        }
        .d-stat { background: #f8fafc; border-radius: 12px; padding: 14px 16px; text-align: center; }
        .d-stat-val { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .d-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 800; }

        .section-heading {
            font-size: 13px; font-weight: 800; color: var(--muted);
            text-transform: uppercase; letter-spacing: .1em; margin: 24px 0 12px;
        }

       
        .s-sub  { font-size: 11px; color: var(--muted); font-weight: 600; }
        .tag-happy   { background: rgba(251,191,36,0.15);  color: #f59e0b; }
        .tag-calm    { background: rgba(52,211,153,0.15);  color: #10b981; }
        .tag-sad     { background: rgba(96,165,250,0.15);  color: #3b82f6; }
        .tag-anxious { background: rgba(167,139,250,0.15); color: #8b5cf6; }
        .tag-alert   { background: rgba(248,113,113,0.15); color: #ef4444; }

        .trend-row { display: flex; align-items: flex-end; gap: 5px; height: 60px; margin-top: 6px; }
        .trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .trend-bar { width: 100%; border-radius: 4px 4px 0 0; background: #e3f2fd; transition: height 0.8s ease; }
        .trend-bar.peak { background: var(--azul-bright); }
        .trend-day { font-size: 9px; color: var(--muted); font-weight: 800; }

        .emotion-pct.happy   { color: #f59e0b; }
        .emotion-pct.calm    { color: #10b981; }
        .emotion-pct.sad     { color: #3b82f6; }
        .emotion-pct.anxious { color: #8b5cf6; }

        /* ── MOBILE ── */
        @media (max-width: 1100px) { .summary-strip { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: flex; }
            .main-content { margin-left: 0; padding: 72px 16px 32px; }
            .summary-strip { grid-template-columns: 1fr 1fr; }
            .drawer { width: 100vw; }
        }

        .nav-item i {
    width: 20px;
    height: 20px;
    stroke-width: 2;
    flex-shrink: 0;
}

.chip-icon i, .view-btn i, .btn-ghost i, .drawer-close i {
    width: 18px; height: 18px; flex-shrink: 0;
}
.chip-icon i { width: 20px; height: 20px; }

.nav-badge {
    margin-left: auto;
    background: #ef4444;
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    display: inline-block;
}
    </style>
</head>
<body>

<!-- ── FUNDO ── -->
<div class="background-layer"></div>
<div id="particles-container"></div>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-mark">
            <div class="logo-icon"><img src="pandas/skin.png" style="width:32px;height:32px;object-fit:contain;"></div>
            <span class="logo-text">Mindfine</span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>
        <a href="inicio-escola.html" class="nav-item">
            <i data-lucide="layout-dashboard"></i> Painel Geral
        </a>
        <a href="turma.html" class="nav-item active">
            <i data-lucide="users"></i> Turmas
        </a>
        <a href="relatorio.html" class="nav-item">
            <i data-lucide="trending-up"></i> Relatórios
        </a>
        <div class="nav-section-label">Gestão</div>
        <a href="alertas.html" class="nav-item">
            <i data-lucide="bell"></i> Alertas
            <span class="nav-badge" id="sidebarBadge">0</span>
        </a>
        <a href="intervencao.html" class="nav-item">
            <i data-lucide="target"></i> Intervenções
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-card">
            <div class="user-avatar">EP</div>
            <div>
                <div class="user-info-name">Escola Painel</div>
                <div class="user-info-role">Administrador</div>
            </div>
        </div>
        <a href="login.html" class="nav-item" style="color:#f87171;margin-top:8px;">
            <i data-lucide="log-out"></i> Sair
        </a>
    </div>
</aside>

<button class="menu-toggle" id="menuToggle"><i data-lucide="menu"></i></button>

<!-- ── MAIN ── -->
<main class="main-content">

    <!-- Header -->
    <div class="page-header fade-in">
        <div class="header-left">
            <h1>Visão de <span>Turmas</span></h1>
            <p>9 turmas ativas · atualizado agora há pouco</p>
        </div>
        <div class="header-right">
<button class="btn-ghost" onclick="exportarCSV()"><i data-lucide="download"></i> Exportar</button>
<button class="btn-primary" onclick="abrirModalNovaTurma()">+ Nova Turma</button>
        </div>
    </div>

    <!-- Summary Strip -->
    <div class="summary-strip fade-in delay-1">
        <div class="summary-chip">
<div class="chip-icon blue"><i data-lucide="users"></i></div>
            <div>
                <div class="chip-value">9</div>
                <div class="chip-label">Turmas Ativas</div>
            </div>
        </div>
        <div class="summary-chip">
<div class="chip-icon green"><i data-lucide="graduation-cap"></i></div>
            <div>
                <div class="chip-value">207</div>
                <div class="chip-label">Alunos Total</div>
            </div>
        </div>
<div class="summary-chip" onclick="window.location='relatorio.html'" style="cursor:pointer;">
<div class="chip-icon purple"><i data-lucide="heart"></i></div>
            <div>
                <div class="chip-value">7.1</div>
                <div class="chip-label">Bem-estar Médio</div>
            </div>
        </div>
<div class="summary-chip" onclick="window.location='alertas.html'" style="cursor:pointer;">
<div class="chip-icon yellow"><i data-lucide="alert-triangle"></i></div>
            <div>
                <div class="chip-value">15</div>
                <div class="chip-label">Alertas Ativos</div>
            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar fade-in delay-2">
        <div class="search-box">
<i data-lucide="search" style="width:18px;height:18px;color:var(--muted);flex-shrink:0;"></i>
            <input type="text" id="searchInput" placeholder="Buscar turma ou curso…" oninput="filterCards()">
        </div>
        <div class="filter-chip">
            <label>Ano</label>
            <select id="filterYear" onchange="filterCards()">
                <option value="all">Todos</option>
                <option value="1">1º Ano</option>
                <option value="2">2º Ano</option>
                <option value="3">3º Ano</option>
            </select>
        </div>
        <div class="filter-chip">
            <label>Curso</label>
            <select id="filterCourse" onchange="filterCards()">
                <option value="all">Todos</option>
                <option value="Informática">Informática</option>
                <option value="Administração">Administração</option>
                <option value="Meio Ambiente">Meio Ambiente</option>
            </select>
        </div>
        <div class="view-toggle">
            <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Grade"><i data-lucide="layout-grid"></i></button>
<button class="view-btn" id="btnList" onclick="setView('list')" title="Lista"><i data-lucide="list"></i></button>
        </div>
    </div>

    <!-- Classes Container -->
    <div id="classesContainer"></div>

</main>

<!-- ── DRAWER ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeDrawer(event)">
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <div>
                <div class="drawer-class-name" id="drawerName">—</div>
                <div class="drawer-class-meta" id="drawerMeta">—</div>
            </div>
<button class="drawer-close" onclick="closeDrawerBtn()"><i data-lucide="x"></i></button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
    </div>
</div>

<!-- MODAL NOVA TURMA -->
<div class="modal-overlay" id="modalNovaTurma" onclick="fecharModalNovaTurma(event)">
    <div style="background:white;border-radius:24px;padding:32px;width:500px;max-width:95vw;
                transform:scale(0.92);transition:transform 0.3s cubic-bezier(.4,0,.2,1);
                box-shadow:0 40px 80px rgba(0,0,0,0.3);margin:auto;align-self:center;"
         id="modalNovaTurmaBox">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
            <div style="font-size:18px;font-weight:800;color:var(--azul-escuro);">Nova Turma</div>
            <button onclick="fecharModalNovaTurmaBtn()"
                    style="width:34px;height:34px;background:#f1f5f9;border:none;border-radius:10px;
                           color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
                <label style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;">Ano</label>
                <select id="ntAno" style="border:2px solid #f0f0f0;border-radius:10px;font-family:'Montserrat',sans-serif;
                                          font-weight:600;font-size:13px;padding:9px 12px;background:#f8fafc;outline:none;">
                    <option value="1">1º Ano</option>
                    <option value="2">2º Ano</option>
                    <option value="3">3º Ano</option>
                </select>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
                <label style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;">Curso</label>
                <select id="ntCurso" style="border:2px solid #f0f0f0;border-radius:10px;font-family:'Montserrat',sans-serif;
                                            font-weight:600;font-size:13px;padding:9px 12px;background:#f8fafc;outline:none;">
                    <option value="Administração">Administração</option>
                    <option value="Informática">Informática</option>
                    <option value="Meio Ambiente">Meio Ambiente</option>
                </select>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
                <label style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;">Período</label>
                <select id="ntPeriodo" style="border:2px solid #f0f0f0;border-radius:10px;font-family:'Montserrat',sans-serif;
                                              font-weight:600;font-size:13px;padding:9px 12px;background:#f8fafc;outline:none;">
                    <option>Manhã</option>
                    <option>Tarde</option>
                </select>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
                <label style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;">Nº de Alunos</label>
                <input id="ntAlunos" type="number" min="1" max="50" value="25"
                       style="border:2px solid #f0f0f0;border-radius:10px;font-family:'Montserrat',sans-serif;
                              font-weight:600;font-size:13px;padding:9px 12px;background:#f8fafc;outline:none;">
            </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px;">
            <label style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;">Professor(a) Responsável</label>
            <input id="ntProf" type="text" placeholder="Ex: Prof. João Silva"
                   style="border:2px solid #f0f0f0;border-radius:10px;font-family:'Montserrat',sans-serif;
                          font-weight:600;font-size:13px;padding:9px 12px;background:#f8fafc;outline:none;width:100%;">
        </div>

        <div style="display:flex;gap:10px;">
            <button onclick="fecharModalNovaTurmaBtn()"
                    style="flex:1;background:white;color:#64748b;border:2px solid #e2e8f0;padding:11px 20px;
                           border-radius:10px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">
                Cancelar
            </button>
            <button onclick="criarNovaTurma()"
                    style="flex:1;background:linear-gradient(135deg,var(--azul-bright),var(--azul-escuro));
                           color:#fff;border:none;padding:11px 20px;border-radius:10px;
                           font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">
                ✓ Criar Turma
            </button>
        </div>
    </div>
</div>

<!-- MODAL RELATÓRIO DA TURMA -->
<div class="modal-overlay" id="modalRelatorio" onclick="fecharRelatorio(event)"
     style="align-items:center;justify-content:center;">
    <div style="background:white;border-radius:24px;padding:32px;width:540px;max-width:95vw;
                max-height:90vh;overflow-y:auto;
                transform:scale(0.92);transition:transform 0.3s cubic-bezier(.4,0,.2,1);
                box-shadow:0 40px 80px rgba(0,0,0,0.3);"
         id="modalRelatorioBox">
        <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
            <button onclick="fecharRelatorioBtn()"
                    style="width:34px;height:34px;background:#f1f5f9;border:none;border-radius:10px;
                           color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div id="relatorioBody"></div>
    </div>
</div>

<script>
    let turmas = [];
    let currentView = 'grid';
    let searchTerm = '';
    let filterCurso = 'all';
    let filterAno = 'all';

    // ========== CARREGAR DADOS REAIS DO BACKEND ==========
    
    async function carregarTurmas() {
        try {
            const response = await fetch('http://localhost:5001/api/escola/turmas');
            turmas = await response.json();
            render();
        } catch (error) {
            console.error('Erro ao carregar turmas:', error);
            turmas = [];
            render();
        }
    }
    
    async function carregarEstatisticas() {
        try {
            const response = await fetch('http://localhost:5001/api/escola/estatisticas');
            const dados = await response.json();
            
            document.querySelectorAll('.summary-chip .chip-value')[0].textContent = turmas.length;
            document.querySelectorAll('.summary-chip .chip-value')[1].textContent = dados.totalAlunos || 0;
            document.querySelectorAll('.summary-chip .chip-value')[2].textContent = dados.nivelMedio || 0;
            document.querySelectorAll('.summary-chip .chip-value')[3].textContent = '0'; // alertas depois
        } catch (error) {
            console.error('Erro ao carregar estatísticas:', error);
        }
    }

    // ========== FUNÇÕES DE RENDERIZAÇÃO ==========
    
    function getFilteredTurmas() {
        return turmas.filter(turma => {
            const matchSearch = searchTerm === '' || turma.nome.toLowerCase().includes(searchTerm);
            const matchCurso = filterCurso === 'all' || turma.nome.includes(filterCurso);
            const matchAno = filterAno === 'all' || turma.nome.startsWith(filterAno);
            return matchSearch && matchCurso && matchAno;
        });
    }
    
    function getScoreClass(score) {
        if (score >= 7) return 'score-high';
        if (score >= 5) return 'score-mid';
        return 'score-low';
    }
    
    function renderGrid(lista) {
        return `
            <div class="classes-grid">
                ${lista.map(turma => `
                    <div class="class-card" onclick="abrirModalTurma('${turma.nome}')">
                        <div class="card-accent accent-blue"></div>
                        <div class="card-body">
                            <div class="card-top">
                                <div>
                                    <div class="class-name">${turma.nome}</div>
                                    <div class="class-meta">${turma.alunos.length} alunos</div>
                                </div>
                                <div class="wellbeing-badge">
                                    <div class="wellbeing-score ${getScoreClass(turma.nivelMedio)}">${turma.nivelMedio}</div>
                                    <div class="wellbeing-label">Nível Médio</div>
                                </div>
                            </div>
                            <div class="mini-emotions">
                                <div class="mini-row">
                                    <span class="mini-emoji">💰</span>
                                    <div class="mini-track"><div class="mini-fill" style="width: ${Math.min(100, turma.totalMoedas / 100)}%; background: #fbbf24;"></div></div>
                                    <span class="mini-pct">${turma.totalMoedas} moedas</span>
                                </div>
                                <div class="mini-row">
                                    <span class="mini-emoji">⭐</span>
                                    <div class="mini-track"><div class="mini-fill" style="width: ${Math.min(100, turma.totalXP / 100)}%; background: #32B5F1;"></div></div>
                                    <span class="mini-pct">${turma.totalXP} XP</span>
                                </div>
                            </div>
                            <div class="card-footer">
                                <div class="student-faces">
                                    ${turma.alunos.slice(0, 4).map((a, i) => `
                                        <div class="face-bubble" style="background: #32B5F1">${i+1}</div>
                                    `).join('')}
                                </div>
                                <span class="face-count">${turma.alunos.length} alunos</span>
                                <div class="alert-tag no-alerts">0 alertas</div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function renderList(lista) {
        return `
            <div class="classes-list">
                ${lista.map(turma => `
                    <div class="list-row" onclick="abrirModalTurma('${turma.nome}')">
                        <div class="list-accent" style="background: #32B5F1"></div>
                        <div class="list-info">
                            <div class="list-name">${turma.nome}</div>
                            <div class="list-meta">${turma.alunos.length} alunos · Nível médio ${turma.nivelMedio}</div>
                        </div>
                        <div class="list-students">${turma.alunos.length}</div>
                        <div class="list-bar-wrap">
                            <div class="list-bar-track">
                                <div class="list-bar-fill" style="width: ${turma.nivelMedio * 10}%; background: #32B5F1"></div>
                            </div>
                        </div>
                        <div class="alert-tag no-alerts">OK</div>
                        <div class="list-arrows">›</div>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function render() {
        const filtered = getFilteredTurmas();
        const container = document.getElementById('classesContainer');
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state">Nenhuma turma encontrada</div>`;
            return;
        }
        
        container.innerHTML = currentView === 'grid' ? renderGrid(filtered) : renderList(filtered);
    }
    
    // ========== FILTROS ==========
    
    function filterCards() {
        searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        filterAno = document.getElementById('filterYear')?.value || 'all';
        filterCurso = document.getElementById('filterCourse')?.value || 'all';
        render();
    }
    
    function setView(view) {
        currentView = view;
        document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
        document.getElementById('btnList').classList.toggle('active', view === 'list');
        render();
    }
    
    // ========== MODAL DA TURMA ==========
    
    async function abrirModalTurma(nomeTurma) {
        const turma = turmas.find(t => t.nome === nomeTurma);
        if (!turma) return;
        
        document.getElementById('drawerName').textContent = turma.nome;
        document.getElementById('drawerMeta').textContent = `${turma.alunos.length} alunos`;
        
        document.getElementById('drawerBody').innerHTML = `
            <div class="drawer-stats">
                <div class="d-stat">
                    <div class="d-stat-val">${turma.alunos.length}</div>
                    <div class="d-stat-lbl">Alunos</div>
                </div>
                <div class="d-stat">
                    <div class="d-stat-val">${turma.totalMoedas}</div>
                    <div class="d-stat-lbl">Moedas</div>
                </div>
                <div class="d-stat">
                    <div class="d-stat-val">${turma.totalXP}</div>
                    <div class="d-stat-lbl">XP Total</div>
                </div>
            </div>
            <div class="section-heading">Lista de Alunos</div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                ${turma.alunos.map(aluno => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #f8fafc; border-radius: 8px;">
                        <div>
                            <div style="font-weight: 800;">${aluno.nome}</div>
                            <div style="font-size: 11px; color: #64748b;">${aluno.matricula}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 800; color: #32B5F1;">NV. ${aluno.nivel || 1}</div>
                            <div style="font-size: 10px;">${aluno.moedas || 0} 🪙</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        
        document.getElementById('modalOverlay').classList.add('open');
    }
    
    function closeDrawer(e) {
        if (e.target === document.getElementById('modalOverlay')) {
            document.getElementById('modalOverlay').classList.remove('open');
        }
    }
    
    function closeDrawerBtn() {
        document.getElementById('modalOverlay').classList.remove('open');
    }
    
    // ========== SIDEBAR ==========
    
    document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });
    
    document.getElementById('searchInput')?.addEventListener('input', filterCards);
    document.getElementById('filterYear')?.addEventListener('change', filterCards);
    document.getElementById('filterCourse')?.addEventListener('change', filterCards);
    
    window.filterCards = filterCards;
    window.setView = setView;
    window.closeDrawer = closeDrawer;
    window.closeDrawerBtn = closeDrawerBtn;


// ========== BADGE DE ALERTAS SINCRONIZADO ==========
function atualizarBadgeAlertas() {
    const contadorSalvo = localStorage.getItem('mindfine_alertas_count');
    const timestamp = localStorage.getItem('mindfine_alertas_timestamp');
    
    const badge = document.getElementById('sidebarBadge');
    if (!badge) return;
    
    // Se tem contador salvo e não é muito antigo (menos de 1 hora), usa ele
    if (contadorSalvo !== null && timestamp && (Date.now() - parseInt(timestamp) < 3600000)) {
        badge.textContent = contadorSalvo;
        badge.style.display = parseInt(contadorSalvo) > 0 ? 'inline-block' : 'none';
    } else {
        // Se não tem ou está antigo, buscar do backend
        buscarAlertasDoBackend();
    }
}

async function buscarAlertasDoBackend() {
    try {
        const response = await fetch('http://localhost:5001/api/alertas');
        const alertas = await response.json();
        const ativos = alertas.filter(a => a.resolvido !== 1).length;
        
        const badge = document.getElementById('sidebarBadge');
        if (badge) {
            badge.textContent = ativos;
            badge.style.display = ativos > 0 ? 'inline-block' : 'none';
        }
        
        // Atualizar cache
        localStorage.setItem('mindfine_alertas_count', ativos);
        localStorage.setItem('mindfine_alertas_timestamp', Date.now());
        
    } catch (error) {
        console.error('Erro ao buscar alertas:', error);
        const badge = document.getElementById('sidebarBadge');
        if (badge) badge.style.display = 'none';
    }
}

// Executar ao carregar a página
document.addEventListener('DOMContentLoaded', () => {
    atualizarBadgeAlertas();
    // Atualizar a cada 30 segundos para manter sincronizado
    setInterval(atualizarBadgeAlertas, 30000);
});
// Inicializar ícones do Lucide
document.addEventListener('DOMContentLoaded', function() {
    lucide.createIcons();
});
    
    // ========== INICIALIZAR ==========
    carregarTurmas();
    carregarEstatisticas();


</script>

</body>
</html>
